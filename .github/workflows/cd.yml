# CD Pipeline - Continuous Deployment
# Deploys to staging on develop branch, production on main branch

name: CD

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  PNPM_VERSION: "9"

jobs:
  # ============================================
  # Determine Environment
  # ============================================
  setup:
    name: Setup Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deploy_backend: ${{ steps.changes.outputs.backend }}
      deploy_frontend: ${{ steps.changes.outputs.frontend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ============================================
  # Build & Push Backend Docker Image
  # ============================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.deploy_backend == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================
  # Deploy Backend to Render
  # ============================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [setup, build-backend]
    environment:
      name: ${{ needs.setup.outputs.environment }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Deploy to Render
        id: deploy
        run: |
          # Trigger Render deploy hook
          if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
            DEPLOY_HOOK="${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"
          else
            DEPLOY_HOOK="${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"
          fi

          if [[ -n "$DEPLOY_HOOK" ]]; then
            curl -X POST "$DEPLOY_HOOK"
            echo "url=https://auto-gen-test-exam-api.onrender.com" >> $GITHUB_OUTPUT
          else
            echo "[WARN] Deploy hook not configured, skipping deployment"
            echo "url=not-deployed" >> $GITHUB_OUTPUT
          fi

      - name: Deployment summary
        run: |
          echo "## Backend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Deploy Frontend to Vercel
  # ============================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.deploy_frontend == 'true' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ needs.setup.outputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Validate Vercel secrets
        id: validate
        run: |
          if [[ -z "${{ secrets.VERCEL_TOKEN }}" ]]; then
            echo "[ERROR] VERCEL_TOKEN secret is not configured"
            echo "Please add VERCEL_TOKEN to GitHub Secrets"
            echo "Get token from: https://vercel.com/account/tokens"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [[ -z "${{ secrets.VERCEL_ORG_ID }}" ]] || [[ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]]; then
            echo "[ERROR] VERCEL_ORG_ID or VERCEL_PROJECT_ID is not configured"
            echo "Run 'vercel link' locally and check .vercel/project.json"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "[OK] All Vercel secrets are configured"
          echo "skip=false" >> $GITHUB_OUTPUT
        working-directory: .

      - name: Checkout code
        if: steps.validate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.validate.outputs.skip != 'true'
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        if: steps.validate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Vercel CLI
        if: steps.validate.outputs.skip != 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        if: steps.validate.outputs.skip != 'true'
        run: |
          if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project
        if: steps.validate.outputs.skip != 'true'
        run: |
          if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        if: steps.validate.outputs.skip != 'true'
        run: |
          if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
            URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Skip deployment notice
        if: steps.validate.outputs.skip == 'true'
        run: |
          echo "[WARN] Frontend deployment skipped - missing Vercel secrets"
          echo "url=skipped" >> $GITHUB_OUTPUT
        id: skip-deploy

      - name: Deployment summary
        run: |
          echo "## Frontend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.validate.outputs.skip }}" == "true" ]]; then
            echo "- **Status:** Skipped (missing secrets)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================
  # Post-Deployment Health Check
  # ============================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [setup, deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Check Backend Health
        if: needs.deploy-backend.result == 'success'
        run: |
          if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
            BACKEND_URL="${{ secrets.BACKEND_URL_PROD }}"
          else
            BACKEND_URL="${{ secrets.BACKEND_URL_STAGING }}"
          fi

          if [[ -n "$BACKEND_URL" ]]; then
            response=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/api/health" || echo "000")
            if [[ "$response" == "200" ]]; then
              echo "[OK] Backend health check passed"
            else
              echo "[WARN] Backend health check returned: $response"
            fi
          else
            echo "[WARN] Backend URL not configured"
          fi

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Environment |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.deploy-backend.result }} | ${{ needs.setup.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-frontend.result }} | ${{ needs.setup.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
